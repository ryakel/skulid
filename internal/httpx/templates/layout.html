{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{.Title}} · skulid</title>
<link rel="stylesheet" href="/static/app.css">
<script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body>
<header>
  <a href="/" class="brand">skulid</a>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/accounts">Accounts</a>
    <a href="/rules">Rules</a>
    <a href="/blocks">Smart blocks</a>
    {{if .Features.Assistant}}<a href="/assistant">Assistant</a>{{end}}
    <a href="/audit">Audit</a>
    <a href="/settings">Settings</a>
  </nav>
  {{if .Session}}
    <form method="post" action="/logout" class="inline">
      <span class="muted">{{.Session.Email}}</span>
      <button type="submit" class="link">Log out</button>
    </form>
  {{end}}
</header>
<main>
  {{if .Flash}}<div class="flash">{{.Flash}}</div>{{end}}
  {{if .Error}}<div class="flash error">{{.Error}}</div>{{end}}
  {{block "body" .}}{{end}}
</main>
</body>
</html>{{end}}
