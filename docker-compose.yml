services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-skulid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-skulid}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skulid} -d ${POSTGRES_DB:-skulid}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    # Pulled from a registry — nothing builds on the host. Override
    # SKULID_IMAGE to point at an internal registry, SKULID_TAG to pin a
    # release. For local development build the image directly with
    # `docker build -t ghcr.io/ryakel/skulid:dev .` and then run with
    # SKULID_TAG=dev.
    image: ${SKULID_IMAGE:-ghcr.io/ryakel/skulid}:${SKULID_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-skulid}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-skulid}?sslmode=disable
      LISTEN_ADDR: ":8567"
      EXTERNAL_URL: ${EXTERNAL_URL:?set EXTERNAL_URL to your public https URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET (any random string >=32 chars)}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY (base64 of 32 random bytes)}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
    ports:
      - "${HOST_PORT:-8567}:8567"

volumes:
  db_data:
