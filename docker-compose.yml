services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-calmaxolotl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-calmaxolotl}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calmaxolotl} -d ${POSTGRES_DB:-calmaxolotl}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    image: calmaxolotl:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-calmaxolotl}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-calmaxolotl}?sslmode=disable
      LISTEN_ADDR: ":8080"
      EXTERNAL_URL: ${EXTERNAL_URL:?set EXTERNAL_URL to your public https URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET (any random string >=32 chars)}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY (base64 of 32 random bytes)}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
    ports:
      - "${HOST_PORT:-8080}:8080"

volumes:
  db_data:
